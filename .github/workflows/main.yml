name: Update Podcast Feed

on:
  schedule:
    - cron: '0 */12 * * *' # 每 12 小時雲端定時執行一次
  workflow_dispatch: # 容許你隨時手動撳掣更新

permissions:
  contents: write # 給予程式寫入並發佈檔案的權限

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp feedgen

      - name: Run Script to Generate RSS
        run: python update_podcast.py

      - name: Commit and Push XML
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add podcast.xml
          git commit -m "Automated update of podcast.xml" || exit 0
          git push
